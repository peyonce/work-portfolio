 <!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Downloading your CV...</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            text-align: center;
            background: #0f172a;
            color: white;
            margin: 0;
        }
        .container {
            padding: 40px;
            background: #1e293b;
            border-radius: 12px;
            max-width: 500px;
        }
        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #1e293b;
            border-top: 4px solid #38bdf8;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        a {
            color: #38bdf8;
            text-decoration: underline;
        }
        .success {
            color: #22c55e;
        }
        .error {
            color: #ef4444;
        }
        .countdown {
            font-size: 1.2rem;
            font-weight: bold;
            color: #38bdf8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <h2>Preparing your download...</h2>
        <div id="status">
            <p>Your CV will download shortly.</p>
            <p class="countdown" id="countdown">3</p>
        </div>
    </div>

    <script>
        // Start download after 1 second
        setTimeout(() => {
            window.location.href = '/Nthabiseng_Phiri_CV.pdf';
        }, 1000);

        // Countdown display
        let count = 3;
        const countdownEl = document.getElementById('countdown');
        const interval = setInterval(() => {
            count--;
            if (count > 0) {
                countdownEl.textContent = count;
            } else {
                countdownEl.textContent = '⬇ Downloading...';
                clearInterval(interval);
            }
        }, 1000);

        // Fallback: if download doesn't start
        setTimeout(() => {
            document.getElementById('status').innerHTML = `
                <p class="success">✅ Download should have started.</p>
                <p>If it didn't, <a href="/Nthabiseng_Phiri_CV.pdf" target="_blank">click here</a> to view your CV.</p>
                <p>Then right-click and select "Save as" to download.</p>
            `;
        }, 5000);
    </script>
</body>
</html>
